name: Build and Release Desktop Apps

on:
  push:
    branches:
      - main     # Spustí build při každém pushi na main
    tags:
      - 'v*'     # Spustí build, když vytvoříš tag (např. v1.0.2-kraken)

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build Electron App
        shell: bash
        run: |
          cd frontend
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            npx electron-builder --mac dmg -c.mac.identity=null
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            npm run desktop:build:win
          else
            npm run desktop:build:linux
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Packages
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/dist-electron/*.exe
            frontend/dist-electron/*.dmg
            frontend/dist-electron/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}