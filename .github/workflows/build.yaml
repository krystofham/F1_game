name: Build and Release Desktop Apps

on:
  push:
    branches:
          - main 

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        # Pouštíme build pro všechny tři platformy na jejich nativních systémech
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # Musíme skočit do složky frontend, nainstalovat to tam a vygenerovat node_modules tamtéž
        run: cd frontend && npm ci

      - name: Build Electron App
        # Podle toho, na jakém operačním systému zrovna běžíme, spustíme správný skript z package.json
        run: |
          cd frontend
          if [ "${{ matrix.os }}" = "macos-latest" ]; then
            npx electron-builder --mac dmg -c.mac.identity=null
          elif [ "${{ matrix.os }}" = "windows-latest" ]; then
            npm run desktop:build:win
          else
            npm run desktop:build:linux
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Tento krok ponecháme, protože electron-builder v základním nastavení dává 
      # hotové soubory do frontend/dist-electron/, odkud je tento skript vezme a nahraje na GitHub.
      - name: Release Packages
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/dist-electron/*.exe
            frontend/dist-electron/*.dmg
            frontend/dist-electron/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}