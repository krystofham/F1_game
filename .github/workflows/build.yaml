name: Build and Release Desktop Apps

on:
  push:
    tags:
      - 'v*' # Spustí se POUZE tehdy, když vytvoříš tag začínající na 'v' (např. v1.0.0)

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Build Electron App
        run: npm run desktop:build --prefix frontend

      # TENTO KROK SAMOTNÝ NAHRAJE SOUBORY DO RELEASE
      - name: Release Packages
        uses: softprops/action-gh-release@v2
        with:
          # Najde ve složce dist-electron všechny instalátory (.exe, .dmg, .AppImage)
          files: |
            frontend/dist-electron/*.exe
            frontend/dist-electron/*.dmg
            frontend/dist-electron/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}